<!DOCTYPE html>
<html>
<head>
    <title>Fahrenheit to Celsius</title>
</head>
<body>
    <h2>Temperature Converter</h2>
    
    <button onclick="changeTemp()">Convert</button>
    
    <p id="result"></p>
<script>
    // Initial temperature (46°F)
let T_f = 46;
const T_c = (T_f - 32) * 5/9;
document.getElementById('result').innerHTML = `${T_f}°F = ${T_c.toFixed(1)}°C`;

function changeTemp() {
    // Ask user for new temperature
    T_f = prompt("Enter temperature in Fahrenheit:", T_f);
    if (T_f !== null) {  // If user didn't click Cancel
        const T_c = (T_f - 32) * 5/9;
        document.getElementById('result').innerHTML = `${T_f}°F = ${T_c.toFixed(1)}°C`;
    }
}
</script>
</body>
   
</html>
